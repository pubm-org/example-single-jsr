name: E2E Test
on:
  repository_dispatch:
    types: [pubm-release]
  workflow_dispatch:
    inputs:
      pubm_version:
        description: "pubm version to test"
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun add jsr pubm@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }} @pubm/core@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }}

      - name: Set prerelease version
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="0.0.1-e2e.${TIMESTAMP}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const jsr = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            jsr.version = '${VERSION}';
            fs.writeFileSync('jsr.json', JSON.stringify(jsr, null, 2));
          "

      - name: Publish
        run: bunx pubm --mode ci --phase publish --any-branch --skip-release
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 30
          BODY=$(curl -s "https://jsr.io/@syi0808/pubm-test-single-jsr/meta.json")
          STATUS=$(echo "$BODY" | grep -c "$VERSION" || true)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Package not found on jsr (HTTP $STATUS)"
            exit 1
          fi
          echo "Package verified on jsr"
